name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix frontend

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: TraceDesk ${{ github.ref_name }}
          releaseBody: |
            ## v0.1.9

            ### AI 채팅
            - AI 채팅 탭을 추가해 활동 날짜별 문맥으로 대화 가능
            - 새 세션 생성, 세션 전환, 세션 비우기, 삭제 지원
            - 최근 대화 기록을 LLM 요청에 포함해 이전 맥락이 이어지도록 개선

            ### 사이버틱 UI/UX
            - 전체 앱 내비게이션, 패널, 채팅 콘솔, 액션 영역의 사이버틱 스타일 강화
            - 긴 텍스트와 채팅 메시지가 컨테이너 밖으로 넘치지 않도록 줄바꿈 처리 보강
            - 커맨드 센터를 활동 신호, 앱 컨텍스트, 행동 패턴 중심으로 재구성

            ### 데스크탑 경험
            - CPU, 메모리, 포트 모니터링 화면과 메인 화면 폴링 제거
            - 시스템 탭과 앱 메뉴의 시스템 항목 제거
            - 경량 모드 설명을 현재 UI 동작에 맞게 정리

            ### 설치
            - macOS (Apple Silicon): `TraceDesk_*_aarch64.dmg` — Applications로 드래그
            - Windows (x64): `TraceDesk_*_x64-setup.exe` — 설치 마법사 실행

            ### 자동 업데이트
            앱 내 **설정 → 앱 업데이트** 또는 메뉴 **업데이트 확인**으로 새 버전을 받을 수 있습니다.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
