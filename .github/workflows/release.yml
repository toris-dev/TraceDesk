name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix frontend

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: TraceDesk ${{ github.ref_name }}
          releaseBody: |
            ## ${{ github.ref_name }}

            ### LLM
            - macOS 로컬/OpenAI 호환 LLM에서 응답 본문이 배열 형태로 내려오는 경우도 안정적으로 처리
            - 비어 있는 LLM 응답은 파싱 실패 대신 원인 확인이 쉬운 메시지로 안내
            - 문자열/배열형 LLM 응답 파서 테스트 추가

            ### Checklist
            - `- [x]` 형식으로 붙여넣은 체크리스트 항목을 완료 상태로 등록
            - 완료 항목 숨기기와 완료 정리 기능 추가
            - 체크리스트 도구 영역의 반응형 UI 정리

            ### 설치
            - macOS (Apple Silicon): `TraceDesk_*_aarch64.dmg` — Applications로 드래그
            - Windows (x64): `TraceDesk_*_x64-setup.exe` — 설치 마법사 실행

            ### 자동 업데이트
            앱 내 **설정 → 앱 업데이트** 또는 메뉴 **업데이트 확인**으로 새 버전을 받을 수 있습니다.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
