name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix frontend

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: TraceDesk ${{ github.ref_name }}
          releaseBody: |
            ## ${{ github.ref_name }}

            ### Pulse
            - TraceDesk가 Docker를 직접 시작하지 않고, 사용자가 지정한 Docker CLI 경로로 외부 런타임 상태만 확인
            - devPulse 프로젝트 경로와 Docker CLI 경로를 저장해 기존 devPulse/Docker 환경에 연결
            - 경로 저장 후 상태 갱신이 앱 UI를 멈추지 않도록 저장 흐름과 상태 조회를 분리
            - 주제 키워드 필터 설정 및 수집 파이프라인 브릿지 연동
            - devpulse_bridge를 Tauri 리소스로 번들해 production 빌드에서도 동작
            - 데스크탑 첫 화면에서 크롤링, 카드, 영상, SNS 파이프라인 수치를 바로 확인할 수 있도록 상단 메트릭 추가

            ### UI
            - 접기/펼치기 가능한 사이버네틱 사이드바(COMMAND / RECORDS / CONFIG)
            - Pulse 화면을 외부 런타임 중심의 사이버틱 데스크탑 UI로 정리
            - 거북이 채팅 독을 우하단 런처 + 팝오버 패널 구조로 재배치해 데스크탑 창 밖으로 밀리지 않도록 수정

            ### Checklist
            - 항상 위에 표시되는 별도 체크리스트 팝업 추가
            - 메인 화면과 팝업 체크리스트가 동일한 로컬 설정 데이터로 동기화
            - 팝업 닫기는 숨김으로 처리해 백그라운드 작업 흐름을 유지

            ### 설치
            - macOS (Apple Silicon): `TraceDesk_*_aarch64.dmg` — Applications로 드래그
            - Windows (x64): `TraceDesk_*_x64-setup.exe` — 설치 마법사 실행

            ### 자동 업데이트
            앱 내 **설정 → 앱 업데이트** 또는 메뉴 **업데이트 확인**으로 새 버전을 받을 수 있습니다.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
