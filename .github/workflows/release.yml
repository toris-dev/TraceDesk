name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix frontend

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: TraceDesk ${{ github.ref_name }}
          releaseBody: |
            ## v0.1.11

            ### Product Design QA
            - Tauri IPC 없이도 로컬 웹 프리뷰에서 주요 화면을 볼 수 있는 dev-only mock 데이터 추가
            - 커맨드 센터, AI 채팅, 좁은 데스크탑 뷰포트 기준 스크린샷 audit 산출물 작성
            - audit에서 발견된 커맨드 센터 마스코트의 시스템 모니터 문구를 행동 패턴 안내 문구로 수정
            - CPU/메모리 진단처럼 보이던 레거시 시스템 네비게이션 문구를 상태 허브 중심으로 정리

            ### 검증 안정화
            - 프론트엔드 lint 규칙을 Tauri 앱 데이터 로딩/모듈 export 패턴에 맞게 조정
            - `npm run lint`, `npm run build`, `cargo check` 통과 상태로 정리
            - chart theme 읽기 경로의 lint 경고 제거

            ### 설치
            - macOS (Apple Silicon): `TraceDesk_*_aarch64.dmg` — Applications로 드래그
            - Windows (x64): `TraceDesk_*_x64-setup.exe` — 설치 마법사 실행

            ### 자동 업데이트
            앱 내 **설정 → 앱 업데이트** 또는 메뉴 **업데이트 확인**으로 새 버전을 받을 수 있습니다.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
