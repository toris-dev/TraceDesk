name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix frontend

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: TraceDesk ${{ github.ref_name }}
          releaseBody: |
            ## v0.1.5

            ### 행동 기록
            - Obsidian 스타일 **행동 그래프** 탐색기 (앱·클립보드·URL 연결 시각화)
            - 그래프 검색으로 복사·붙여넣기·캡처 내역 빠르게 찾기
            - 시간대별 행동 차트·타임라인 스트립 개선

            ### AI / LLM
            - 설정에서 **Ollama** 또는 **OpenAI 호환 API** 연결
            - 연결 상태 배지·연결하기 흐름
            - 우하단 거북이 **리사이즈 가능 채팅** (활동 기록 컨텍스트 포함)

            ### 백엔드
            - `get_action_events` — 클립보드 미리보기 포함 상세 행동 API
            - LLM 채팅·활동 질의 커맨드 (`llm_chat`, `llm_ask_actions`)

            ### 설치
            - macOS (Apple Silicon): `TraceDesk_*_aarch64.dmg` — Applications로 드래그
            - Windows (x64): `TraceDesk_*_x64-setup.exe` — 설치 마법사 실행

            ### 자동 업데이트
            앱 내 **설정 → 앱 업데이트** 또는 메뉴 **업데이트 확인**으로 새 버전을 받을 수 있습니다.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
