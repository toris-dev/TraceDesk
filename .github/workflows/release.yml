name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix frontend

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: TraceDesk ${{ github.ref_name }}
          releaseBody: |
            ## ${{ github.ref_name }}

            ### Desktop UI
            - Windows 네이티브 상단바와 테두리 그림자를 제거하고 TraceDesk 내부 사이버틱 타이틀바로 대체
            - 드래그 가능한 커스텀 헤더와 최소화/최대화/닫기 버튼 추가
            - 사이버틱 외곽선, 상단 command strip, 사이드바 간격과 접기/펼치기 UI 정리

            ### Performance
            - 시스템 모니터를 lazy 초기화로 전환해 앱 시작 시 프로세스/포트 스캔 비용 제거
            - 컬렉터 폴링과 설정 확인 주기를 완화해 백그라운드 CPU wake-up 감소
            - 시스템 상태 프로세스/포트 스캔 주기와 표시 개수 축소
            - 숨김/비활성 화면에서는 활동 자동 갱신과 실시간 이벤트 구독을 줄이도록 조정

            ### Checklist
            - 여러 줄 `- [ ]` 형식의 체크리스트를 붙여넣으면 항목별로 자동 분리 등록
            - 체크리스트 기본 문구와 빠른 작업을 TraceDesk 활동 중심으로 정리

            ### Removed
            - 인스타 업로드/devPulse/Pulse 탭과 관련 Tauri command, scheduler, 번들 리소스 제거
            - 미사용 Founder CRM 스타일 제거

            ### 설치
            - macOS (Apple Silicon): `TraceDesk_*_aarch64.dmg` — Applications로 드래그
            - Windows (x64): `TraceDesk_*_x64-setup.exe` — 설치 마법사 실행

            ### 자동 업데이트
            앱 내 **설정 → 앱 업데이트** 또는 메뉴 **업데이트 확인**으로 새 버전을 받을 수 있습니다.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
