name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix frontend

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: TraceDesk ${{ github.ref_name }}
          releaseBody: |
            ## ${{ github.ref_name }}

            ### Founder CRM
            - `TraceDesk` 이름은 유지하면서 제품 경험을 `1인 개발자를 위한 CRM` 흐름으로 확장
            - 만난 사람, 투자자, 고객을 한 화면에서 관리하는 Founder CRM 탭 추가
            - 다음 팔로업 일정과 최근 대화 맥락을 로컬 DB에 저장하고 AI 리마인더로 노출
            - `3주 전에 이야기했던 사람입니다.` 같은 관계 복원형 알림을 데스크탑 UI에 추가

            ### Pulse
            - Production에서 devPulse 경로가 없어도 Pulse 화면이 정상 표시되도록 상태 API를 graceful하게 처리
            - devPulse 폴더 선택, Docker CLI/데몬 상태, compose 서비스 헬스 패널 추가
            - 주제 키워드 필터 설정 및 수집 파이프라인 브릿지 연동
            - devpulse_bridge를 Tauri 리소스로 번들해 production 빌드에서도 동작
            - 데스크탑 첫 화면에서 크롤링, 카드, 영상, SNS 파이프라인 수치를 바로 확인할 수 있도록 상단 메트릭 추가

            ### UI
            - 접기/펼치기 가능한 사이버네틱 사이드바(COMMAND / RECORDS / CONFIG)
            - 거북이 채팅 독을 우하단 런처 + 팝오버 패널 구조로 재배치해 데스크탑 창 밖으로 밀리지 않도록 수정

            ### 설치
            - macOS (Apple Silicon): `TraceDesk_*_aarch64.dmg` — Applications로 드래그
            - Windows (x64): `TraceDesk_*_x64-setup.exe` — 설치 마법사 실행

            ### 자동 업데이트
            앱 내 **설정 → 앱 업데이트** 또는 메뉴 **업데이트 확인**으로 새 버전을 받을 수 있습니다.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
