name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix frontend

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: TraceDesk ${{ github.ref_name }}
          releaseBody: |
            ## v0.1.8

            ### AI / RAG
            - 복사·붙여넣기·캡처 기록을 질문과 관련도 기준으로 선별해 답변 문맥에 반영
            - 한국어/영어 행동 키워드와 앱, 창 제목, 클립보드 미리보기 검색 강화
            - 커맨드 센터에서 사용자 행동 패턴을 AI 프로필 형태로 요약

            ### 행동 기록 UX
            - 복사·붙여넣기·캡처가 발생한 날짜와 위치를 빠르게 확인하는 날짜 스트립 추가
            - 행동 그래프 확대/축소를 마우스 위치 기준으로 개선하고 키보드 조작 추가
            - 사이버틱한 사이드바, 상단 툴바, 그래프, AI 패널 디자인 적용

            ### 업데이트 / 설정 안정성
            - 앱 시작 및 메뉴 확인 시 새 버전이 있으면 업데이트 가능 배너 표시
            - 기존 macOS 설정 파일에 새 필드가 없어도 설정 완료 상태가 초기화되지 않도록 수정

            ### 설치
            - macOS (Apple Silicon): `TraceDesk_*_aarch64.dmg` — Applications로 드래그
            - Windows (x64): `TraceDesk_*_x64-setup.exe` — 설치 마법사 실행

            ### 자동 업데이트
            앱 내 **설정 → 앱 업데이트** 또는 메뉴 **업데이트 확인**으로 새 버전을 받을 수 있습니다.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
